name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-artifacts:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          rust-targets: ${{ matrix.target }}

      - name: Verify release config
        run: npm run release:verify-config

      - name: Build artifact
        run: npm run release:build-artifact -- ${{ matrix.target }}

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.target }}
          path: .work/release/artifacts/

  github-release:
    name: publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: .work/release/artifacts
          pattern: release-artifacts-*
          merge-multiple: true

      - name: Run release quality gates
        run: npm run release:quality-gates

      - name: Publish repo-native release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:ci
